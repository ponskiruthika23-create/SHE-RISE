<!DOCTYPE html>
<html>
<head>
    <title>Personal Details - SheRise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
    <h2>Your Personal Details 💜</h2>

    <form>

        <label>Full Name</label>
        <input type="text" required>

        <label>Age</label>
        <input type="number" required>

        <label>Higher Studies Level</label>
        <select required>
            <option value="">Select</option>
            <option>School</option>
            <option>Diploma</option>
            <option>Undergraduate</option>
            <option>Postgraduate</option>
            <option>Other</option>
        </select>

        <label>Individual Interests</label>
        <input type="text" placeholder="Example: Art, Music, Business">

        <label>Work Experience / Skills</label>

        <input type="checkbox"> Cooking <br>
        <input type="checkbox"> Tailoring <br>
        <input type="checkbox"> Craft Work <br>
        <input type="checkbox"> Ari Work <br>
        <input type="checkbox"> Decoration Designing <br>
        <input type="checkbox"> Motivational Speaking <br><br>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
