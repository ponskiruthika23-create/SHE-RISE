<!DOCTYPE html>
<html>
<head>
    <title>Personal Details - SheShield</title>
    <style>
        body {
            font-family: Arial;
            background-color: #fce4ec;
            text-align: center;
        }

        .container {
            background-color: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            color: #c2185b;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px;
            width: 95%;
            background-color: #c2185b;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #880e4f;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Personal Details</h2>

    <input type="text" placeholder="Full Name" required><br>
    <input type="number" placeholder="Age" required><br>
    <input type="date" required><br>
    <input type="tel" placeholder="Phone Number" required><br>
    <input type="email" placeholder="Email ID" required><br>
    <input type="text" placeholder="City" required><br>

    <h3>Emergency Contact</h3>

    <input type="text" placeholder="Emergency Contact Name" required><br>
    <input type="tel" placeholder="Emergency Contact Number" required><br>

    <select required>
        <option value="">Relationship</option>
        <option>Mother</option>
        <option>Father</option>
        <option>Friend</option>
        <option>Husband</option>
        <option>Guardian</option>
    </select><br><br>

    <button onclick="saveData()">Save Details</button>

</div>

<script>
function saveData() {
    alert("Details Saved Successfully!");
}
</script>

</body>
</html>
